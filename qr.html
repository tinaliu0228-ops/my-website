<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI动手指数调研 - 扫码参与</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .qr-container {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
        }
        .url {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            color: #667eea;
            word-break: break-all;
            margin-bottom: 20px;
        }
        .instructions {
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .instructions h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .instructions ol {
            padding-left: 20px;
        }
        .instructions li {
            margin: 10px 0;
            color: #555;
        }
        .instructions code {
            background: #e8ecff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            margin: 10px 5px;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn-secondary {
            background: #f8f9fa;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 AI动手指数调研</h1>
        <p class="subtitle">扫码参与问卷调查</p>

        <div class="qr-container">
            <div id="qrcode"></div>
        </div>

        <div class="url" id="survey-url">加载中...</div>

        <div>
            <a href="index.html" class="btn">打开问卷</a>
            <a href="stats.html" class="btn btn-secondary">查看统计</a>
        </div>

        <div class="instructions">
            <h3>📋 使用说明</h3>
            <ol>
                <li>在当前目录启动本地服务器：
                    <br><code>python -m http.server 8080</code>
                </li>
                <li>学员扫码或访问链接填写问卷</li>
                <li>点击「查看统计」查看班级平均分</li>
                <li>支持导出CSV文件进行进一步分析</li>
            </ol>
        </div>
    </div>

    <script>
        // 获取当前URL
        const baseUrl = window.location.href.replace('qr.html', 'index.html');
        document.getElementById('survey-url').textContent = baseUrl;

        // 生成二维码
        QRCode.toCanvas(baseUrl, {
            width: 200,
            margin: 2,
            color: {
                dark: '#333',
                light: '#fff'
            }
        }, function(error, canvas) {
            if (error) {
                console.error(error);
                return;
            }
            document.getElementById('qrcode').appendChild(canvas);
        });
    </script>
</body>
</html>
